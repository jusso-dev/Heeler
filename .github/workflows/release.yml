name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }} -p heeler-server
      - name: Package
        run: |
          NAME="heeler-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$NAME"
          cp "target/${{ matrix.target }}/release/heeler" "$NAME/"
          cp README.md LICENSE SECURITY.md CHANGELOG.md config/heeler.example.toml "$NAME/"
          tar -czf "$NAME.tar.gz" "$NAME"
          shasum -a 256 "$NAME.tar.gz" > "$NAME.tar.gz.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: heeler-${{ matrix.target }}
          path: |
            heeler-*.tar.gz
            heeler-*.sha256

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Combined checksums
        run: cat heeler-*.sha256 > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            heeler-*.tar.gz
            heeler-*.sha256
            SHA256SUMS
